name: Test

on:
  workflow_call:
  push:
  pull_request:
  merge_group: # Needed for PR merge queues
    types: [ checks_requested ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
      - name: Install dependencies
        run: dotnet restore NetprobeSharp.slnx
      - name: Build
        run: dotnet build NetprobeSharp.slnx --no-restore
      - name: Run Tests
        run: dotnet test NetprobeSharp.slnx --no-build

  aot-publish:
    name: AOT Publish (linux-x64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
      - name: Install NativeAOT prerequisites
        run: sudo apt-get install -y clang zlib1g-dev
      - name: Publish (NativeAOT linux-x64)
        run: dotnet publish src/NetprobeSharp.csproj -r linux-x64 -c Release
