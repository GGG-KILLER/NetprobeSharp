name: Test

on:
  workflow_call:
  push:
  pull_request:
  merge_group: # Needed for PR merge queues
    types: [ checks_requested ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Install dependencies
        run: dotnet restore NetprobeSharp.slnx
      - name: Build
        run: dotnet build NetprobeSharp.slnx --no-restore
      - name: Run Tests
        run: dotnet test NetprobeSharp.slnx --no-build

  docker-dev:
    name: Docker (dev)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            VERSION=dev
            REVISION=${{ github.sha }}
          tags: gggdotdev/netprobesharp:dev
          push: true
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: index.docker.io/gggdotdev/netprobesharp
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  aot-publish:
    name: AOT Publish (linux-x64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Install NativeAOT prerequisites
        run: sudo apt-get install -y clang zlib1g-dev
      - name: Publish (NativeAOT linux-x64)
        run: dotnet publish src/NetprobeSharp.csproj -r linux-x64 -c Release
